<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact - Weather App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="contact.css" />
</head>
<body>

<div class="page">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">🌦 Weather Wizard</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="favorites.html">Favorites</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
          <li class="nav-item ms-3">
            <button id="themeToggle" class="btn btn-outline-light">🌙</button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="contact">
    <h3>Contact Form</h3>
    <form id="contactForm">
      <p id="successMsg">✅ Message Sent!</p>

      <div class="form-row">
        <label for="name">Name</label>
        <input id="name" type="text" placeholder="Your name" required />
      </div>

      <div class="form-row">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Your email" required />
      </div>

      <div class="form-row">
        <label for="message">Message</label>
        <textarea id="message" placeholder="Your message..." required></textarea>
      </div>

      <div class="submit">
        <button type="submit">Submit</button>
      </div>
    </form>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
