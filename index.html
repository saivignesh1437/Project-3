<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Wizard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">🌦 Weather Wizard</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="favorites.html">Favorites</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        <li class="nav-item ms-3">
          <button id="themeToggle" class="btn btn-outline-light">🌙</button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main>
  <section>
    <input type="text" id="cityInput" placeholder="Search City..." />
    <button id="searchBtn">Search</button>
  </section>

  <section class="weather-card">
    <img id="weatherIcon" src="" alt="weather icon" />
    <h2 id="cityName">Hyderabad</h2>
    <h1 id="temperature">--°C</h1>
    <p id="condition">Loading...</p>
  </section>

  <section class="forecast">
    <h3>📆 5-Day Forecast</h3>
    <div class="days">
      <button>Mon</button>
      <button>Tue</button>
      <button>Wed</button>
      <button>Thu</button>
      <button>Fri</button>
    </div>
  </section>

  <section>
    <button id="addFavBtn">⭐ Add to Favorites</button>
  </section>
</main>

<footer>
  <p>© 2026 Weather Wizard</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
