<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Favorites - Weather App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="favorites.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">🌦 Weather Wizard</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="favorites.html">Favorites</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        <li class="nav-item ms-3">
          <button class="btn btn-outline-light" id="themeToggle">🌙</button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="fav-container">
  <div class="fav-card">
    <button class="btn btn-secondary mb-3" style="margin:20px 20px 0;" onclick="window.location.href='index.html'">← Back</button>
    <h2>⭐ Favorite Cities</h2>

    <div class="search-box">
      <input type="text" placeholder="Search favorite cities..." id="favSearchInput" />
      <button class="search-btn" id="favSearchBtn">Search</button>
    </div>

    <div class="city-list" id="cityList"></div>

    <p class="empty-text">→ No favorite cities? <b>Add some to your list!</b></p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script>
  renderFavorites();
  const favSearchInput = document.getElementById('favSearchInput');
  const favSearchBtn = document.getElementById('favSearchBtn');
  if (favSearchBtn && favSearchInput) {
    favSearchBtn.addEventListener('click', () => renderFavorites(favSearchInput.value));
    favSearchInput.addEventListener('keyup', () => renderFavorites(favSearchInput.value));
  }
</script>
</body>
</html>
